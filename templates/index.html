<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRM Full Stack Engineering Challenge</title>
    <style>
      body {
        font-family: monospace;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        background-color: #f4f4f9;
        color: #333;
      }
      h1, h3 {
        color: #2c3e50;
      }
      textarea {
        width: 100%;
        height: 150px;
        display: block;
        margin-bottom: 10px;
        font-family: monospace;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 5px;
      }
      button:hover {
        background-color: #2980b9;
      }
      button[type="button"] {
        background-color: #95a5a6;
      }
      button[type="button"]:hover {
        background-color: #7f8c8d;
      }
      .results {
        margin-top: 20px;
        border-top: 2px solid #2c3e50;
        padding-top: 20px;
      }
      pre {
        background: #2d3436;
        color: #dfe6e9;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
      }
      .error {
        color: #e74c3c;
        font-weight: bold;
      }
      .info-card {
        background: white;
        padding: 15px;
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h1>SRM Full Stack Engineering Challenge</h1>
    <div class="info-card">
      <form id="graphForm">
        <label><strong>Edge Data (A->B, one per line):</strong></label>
        <textarea id="edgeData" placeholder="A->B
B->C"></textarea>
        <button type="submit">Submit</button>
        <button
          type="button"
          onclick="
            document.getElementById('edgeData').value = '';
            document.getElementById('results').innerHTML = '';
          "
        >
          Clear
        </button>
      </form>
    </div>

    <div id="results" class="results"></div>

    <script>
      document
        .getElementById("graphForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const resultsDiv = document.getElementById("results");
          const edges = document
            .getElementById("edgeData")
            .value.split("\n")
            .filter((line) => line.trim().length > 0);

          if (edges.length === 0) {
            alert("No data entered");
            return;
          }

          resultsDiv.innerHTML = "<p>Processing...</p>";

          try {
            const response = await fetch("/bfhl", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ data: edges }),
            });

            if (!response.ok) throw new Error("Server error");

            const data = await response.json();

            let html = "<div class='info-card'>";
            html += "<h3>User Information</h3>";
            html += `<p><strong>User ID:</strong> ${data.user_id}</p>`;
            html += `<p><strong>Email ID:</strong> ${data.email_id}</p>`;
            html += `<p><strong>Roll Number:</strong> ${data.college_roll_number}</p>`;
            html += "</div>";

            html += "<div class='info-card'>";
            html += "<h3>Summary</h3>";
            html += `<p>Total Trees: ${data.summary.total_trees}</p>`;
            html += `<p>Total Cycles: ${data.summary.total_cycles}</p>`;
            html += `<p>Largest Tree Root: ${data.summary.largest_tree_root || "N/A"}</p>`;
            html += "</div>";

            html += "<h3>Hierarchies</h3>";
            if (data.hierarchies.length === 0) {
              html += "<p>No hierarchies found.</p>";
            }
            data.hierarchies.forEach((h) => {
              html += `<div class='info-card'>`;
              html += `<div><strong>Root: ${h.root}</strong> ${h.has_cycle ? "<span class='error'>(Cycle Detected)</span>" : `(Depth: ${h.depth})`}</div>`;
              if (!h.has_cycle) {
                html += `<pre>${formatTree(h.tree)}</pre>`;
              }
              html += `</div>`;
            });

            if (data.invalid_entries.length > 0) {
              html += `<div class="info-card error"><h3>Invalid Entries</h3><p>${data.invalid_entries.join(", ")}</p></div>`;
            }
            if (data.duplicate_edges.length > 0) {
              html += `<div class="info-card"><h3>Duplicate Edges</h3><p>${data.duplicate_edges.join(", ")}</p></div>`;
            }

            resultsDiv.innerHTML = html;
          } catch (err) {
            resultsDiv.innerHTML = `<p class="error">Error: ${err.message}</p>`;
          }
        });

      function formatTree(obj, indent = "") {
        let res = "";
        for (const key in obj) {
          res += indent + "└─ " + key + "\n";
          res += formatTree(obj[key], indent + "   ");
        }
        return res;
      }
    </script>
  </body>
</html>
